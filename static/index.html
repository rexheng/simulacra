<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Simulation Engine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0a0e17;
      --bg-card: rgba(15, 20, 35, 0.8);
      --bg-card-hover: rgba(20, 28, 50, 0.9);
      --border: #1a2340;
      --border-hover: #2a3660;
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.15);
      --cyan-glow: rgba(0, 212, 255, 0.3);
      --amber: #f59e0b;
      --amber-dim: rgba(245, 158, 11, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --muted: #64748b;
      --muted-dim: rgba(100, 116, 139, 0.15);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-dim: #64748b;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --radius: 8px;
      --transition: 200ms ease;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(0, 212, 255, 0.03) 1px, transparent 0);
      background-size: 32px 32px;
    }

    /* === NAV === */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--cyan), #0088aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--bg-deep);
      letter-spacing: -1px;
    }

    .nav-brand-text {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      transition: color var(--transition), background var(--transition);
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text);
      background: var(--cyan-dim);
    }

    /* === MAIN === */
    #app {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 24px 48px;
      min-height: 100vh;
    }

    /* === CARDS === */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .card:not(.disabled):hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
    }

    .card.disabled {
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-header h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .card-description {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }

    .experiment-card {
      cursor: pointer;
    }

    /* === BADGES === */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-pending {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .badge-running {
      background: var(--cyan-dim);
      color: var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    .badge-completed, .badge-success {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-failed {
      background: var(--red-dim);
      color: var(--red);
    }

    .badge-muted {
      background: var(--muted-dim);
      color: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* === FORMS === */
    .config-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group .field-desc {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: -2px;
    }

    input, textarea, select {
      background: rgba(10, 14, 23, 0.6);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* === BUTTONS === */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      color: var(--text);
      background: var(--bg-card);
    }

    .btn:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), #0088cc);
      color: var(--bg-deep);
      border: none;
      font-weight: 600;
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px var(--cyan-glow);
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: none;
      box-shadow: none;
    }

    /* === VIEW HEADER === */
    .view-header {
      margin-bottom: 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 12px;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--cyan);
    }

    .view-header h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .view-header p {
      color: var(--text-secondary);
      margin-top: 6px;
      font-size: 13px;
    }

    /* === STAGE PIPELINE === */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 24px 0;
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .pipeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .pipeline-dot.pending { background: var(--muted); }
    .pipeline-dot.running {
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    .pipeline-dot.completed { background: var(--green); box-shadow: 0 0 8px var(--green-dim); }
    .pipeline-dot.failed { background: var(--red); box-shadow: 0 0 8px var(--red-dim); }

    .pipeline-label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .pipeline-line {
      flex: 1;
      min-width: 40px;
      height: 2px;
      background: var(--border);
      margin: 0 8px;
    }

    .pipeline-line.completed { background: var(--green); }
    .pipeline-line.running { background: linear-gradient(90deg, var(--cyan), var(--border)); }

    /* === RESULTS === */
    .report-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px 0;
      line-height: 1.7;
    }

    .report-panel h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--cyan);
    }

    .report-content { color: var(--text-secondary); font-size: 13px; }
    .report-content p { margin-bottom: 10px; }
    .report-content ul { padding-left: 20px; margin-bottom: 10px; }
    .report-content li { margin-bottom: 4px; }
    .report-content strong { color: var(--text); font-weight: 600; }

    /* === AGENT CARDS === */
    .agent-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

    .agent-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition);
    }

    .agent-card:hover { border-color: var(--border-hover); }

    .agent-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }

    .agent-card-header:hover { background: rgba(255,255,255,0.02); }

    .agent-persona-summary {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--cyan-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--cyan);
      flex-shrink: 0;
    }

    .agent-name { font-weight: 500; font-size: 13px; }
    .agent-occupation { color: var(--text-dim); font-size: 12px; }

    .agent-card-body {
      padding: 0 18px 18px;
      display: none;
    }

    .agent-card.expanded .agent-card-body { display: block; }

    .agent-card .chevron {
      color: var(--text-dim);
      transition: transform var(--transition);
      font-size: 12px;
    }

    .agent-card.expanded .chevron { transform: rotate(180deg); }

    .persona-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
    }

    .persona-detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .persona-detail-value {
      font-size: 13px;
      color: var(--text);
    }

    .agent-response {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      white-space: pre-wrap;
    }

    /* === ERROR PANEL === */
    .error-panel {
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px 0;
    }

    .error-panel h3 {
      color: var(--red);
      font-family: var(--font-display);
      margin-bottom: 12px;
    }

    .error-panel p { color: var(--text-secondary); font-size: 13px; }

    /* === HISTORY TABLE === */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .history-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    .history-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(26, 35, 64, 0.5);
      color: var(--text-secondary);
    }

    .history-table tr {
      cursor: pointer;
      transition: background var(--transition);
    }

    .history-table tbody tr:hover {
      background: var(--bg-card-hover);
    }

    .history-table .type-col {
      font-weight: 500;
      color: var(--text);
    }

    /* === TOAST === */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--font-mono);
      animation: toast-in 0.3s ease, toast-out 0.3s ease 3.7s forwards;
      max-width: 400px;
    }

    .toast-info {
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: var(--cyan);
    }

    .toast-error {
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
    }

    .toast-success {
      background: var(--green-dim);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p { margin-bottom: 20px; font-size: 13px; }

    /* === SIM HEADER === */
    .sim-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .sim-meta {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .sim-meta span { display: flex; align-items: center; gap: 4px; }

    /* === LOADING === */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-dim);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === SECTION TITLE === */
    .section-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 28px 0 14px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      #navbar { padding: 0 16px; }
      #app { padding: 72px 16px 32px; }
      .card-grid { grid-template-columns: 1fr; }
      .pipeline { flex-wrap: wrap; gap: 8px; }
      .sim-header { flex-direction: column; align-items: flex-start; }
      .persona-details { grid-template-columns: 1fr 1fr; }
      .nav-brand-text { font-size: 13px; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <a href="#/" class="nav-brand">
    <div class="nav-brand-icon">SS</div>
    <span class="nav-brand-text">Social Simulation Engine</span>
  </a>
  <div class="nav-links">
    <a href="#/" class="nav-link" data-route="">Experiments</a>
    <a href="#/history" class="nav-link" data-route="history">History</a>
  </div>
</nav>

<main id="app"></main>

<div id="toast-container"></div>

<script>
  // === API HELPER ===
  const API = '/api/v1';

  async function api(path, options = {}) {
    try {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || `API error: ${res.status}`);
      }
      return await res.json();
    } catch (err) {
      showToast(err.message, 'error');
      throw err;
    }
  }

  // === TOAST ===
  function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // === POLLING ===
  let pollInterval = null;
  function clearPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  }

  // === P5 CLEANUP ===
  let p5Instance = null;
  function cleanupP5() {
    if (p5Instance) { p5Instance.remove(); p5Instance = null; }
  }

  // === ROUTER ===
  const routes = {
    '': renderHome,
    'history': renderHistory,
  };

  function router() {
    clearPolling();
    cleanupP5();
    const hash = location.hash.slice(1).replace(/^\//, '') || '';
    const app = document.getElementById('app');

    // Update active nav
    document.querySelectorAll('.nav-link').forEach(link => {
      const route = link.dataset.route;
      link.classList.toggle('active', route === hash || (route === '' && hash === ''));
    });

    if (hash.startsWith('run/')) {
      renderRunForm(hash.slice(4));
    } else if (hash.startsWith('sim/')) {
      renderSimulation(hash.slice(4));
    } else if (hash.startsWith('neighborhood/')) {
      renderNeighborhood(hash.slice('neighborhood/'.length));
    } else if (routes[hash]) {
      routes[hash]();
    } else {
      renderHome();
    }
  }

  window.addEventListener('hashchange', router);
  window.addEventListener('DOMContentLoaded', router);

  // === HELPERS ===
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDuration(start, end) {
    if (!start || !end) return 'In progress';
    const ms = new Date(end) - new Date(start);
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    return `${m}m ${s % 60}s`;
  }

  function statusBadge(status) {
    return `<span class="badge badge-${status}">${esc(status)}</span>`;
  }

  function simpleMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/<\/ul>\s*<ul>/g, '')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  // === VIEWS (stubs — replaced in subsequent tasks) ===
  async function renderHome() {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading experiments...</div>';

    try {
      const experiments = await api('/experiments');
      const types = Object.entries(experiments);

      app.innerHTML = `
        <div class="view-header">
          <h2>Experiments</h2>
          <p>Select a simulation to configure and run</p>
        </div>
        <div class="card-grid">
          ${types.map(([type, exp]) => {
            const isStub = exp.status === 'stub';
            return `
              <div class="card experiment-card ${isStub ? 'disabled' : ''}"
                   ${isStub ? '' : `onclick="location.hash='/run/${esc(type)}'"`}>
                <div class="card-header">
                  <h3>${esc(exp.name)}</h3>
                  <span class="badge badge-${isStub ? 'muted' : 'success'}">
                    ${isStub ? 'Coming Soon' : 'Active'}
                  </span>
                </div>
                <p class="card-description">${esc(exp.description)}</p>
              </div>`;
          }).join('')}
        </div>`;
    } catch (e) {
      app.innerHTML = '<div class="empty-state"><h3>Could not load experiments</h3><p>Check that the API is running.</p></div>';
    }
  }

  async function renderRunForm(type) {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading form...</div>';

    try {
      const experiments = await api('/experiments');
      const exp = experiments[type];
      if (!exp) {
        app.innerHTML = `<div class="empty-state"><h3>Unknown experiment type</h3><p>"${esc(type)}" is not a valid experiment.</p><a href="#/" class="btn">Back to Experiments</a></div>`;
        return;
      }

      const schema = exp.config_schema || {};
      const fields = Object.entries(schema)
        .filter(([key]) => !['model_id', 'max_concurrent'].includes(key))
        .map(([key, def]) => renderField(key, def))
        .join('');

      app.innerHTML = `
        <div class="view-header">
          <a href="#/" class="back-link">&larr; Experiments</a>
          <h2>${esc(exp.name)}</h2>
          <p>${esc(exp.description)}</p>
        </div>
        <form id="sim-form" class="config-form">
          ${fields}
          <div><button type="submit" class="btn btn-primary">Run Simulation</button></div>
        </form>`;

      document.getElementById('sim-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Starting...';

        try {
          const config = {};
          for (const [key, def] of Object.entries(schema)) {
            if (['model_id', 'max_concurrent'].includes(key)) continue;
            const input = document.getElementById('field-' + key);
            if (!input) continue;
            let val = input.value;
            if (def.type === 'integer') val = parseInt(val, 10);
            else if (def.type === 'number' || def.type === 'float') val = parseFloat(val);
            config[key] = val;
          }

          const sim = await api('/simulations', {
            method: 'POST',
            body: JSON.stringify({ simulation_type: type, config }),
          });
          location.hash = '/sim/' + sim.id;
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Run Simulation';
        }
      });
    } catch (e) {
      app.innerHTML = '<div class="empty-state"><h3>Could not load experiment</h3><p>Check that the API is running.</p></div>';
    }
  }

  function renderField(key, def) {
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const desc = def.description || '';
    const required = def.required ? 'required' : '';

    if (def.enum) {
      const options = def.enum.map(v =>
        `<option value="${esc(v)}" ${v === def.default ? 'selected' : ''}>${esc(v)}</option>`
      ).join('');
      return `<div class="form-group">
        <label for="field-${esc(key)}">${esc(label)}</label>
        ${desc ? `<span class="field-desc">${esc(desc)}</span>` : ''}
        <select id="field-${esc(key)}" ${required}>${options}</select>
      </div>`;
    }

    if (def.type === 'string' && def.required) {
      return `<div class="form-group">
        <label for="field-${esc(key)}">${esc(label)}</label>
        ${desc ? `<span class="field-desc">${esc(desc)}</span>` : ''}
        <textarea id="field-${esc(key)}" placeholder="Enter ${label.toLowerCase()}..." ${required}>${def.default || ''}</textarea>
      </div>`;
    }

    if (def.type === 'string') {
      return `<div class="form-group">
        <label for="field-${esc(key)}">${esc(label)}</label>
        ${desc ? `<span class="field-desc">${esc(desc)}</span>` : ''}
        <input type="text" id="field-${esc(key)}" value="${esc(String(def.default || ''))}" ${required}>
      </div>`;
    }

    if (def.type === 'integer' || def.type === 'number' || def.type === 'float') {
      const step = def.type === 'integer' ? '1' : 'any';
      return `<div class="form-group">
        <label for="field-${esc(key)}">${esc(label)}</label>
        ${desc ? `<span class="field-desc">${esc(desc)}</span>` : ''}
        <input type="number" id="field-${esc(key)}" value="${def.default != null ? def.default : ''}" step="${step}" ${required}>
      </div>`;
    }

    return `<div class="form-group">
      <label for="field-${esc(key)}">${esc(label)}</label>
      ${desc ? `<span class="field-desc">${esc(desc)}</span>` : ''}
      <input type="text" id="field-${esc(key)}" value="${esc(String(def.default || ''))}" ${required}>
    </div>`;
  }

  async function renderSimulation(id) {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading simulation...</div>';

    try {
      const sim = await api('/simulations/' + id);
      renderSimView(sim);

      if (sim.status === 'pending' || sim.status === 'running') {
        pollInterval = setInterval(async () => {
          try {
            const updated = await api('/simulations/' + id);
            renderSimView(updated);
            if (updated.status === 'completed' || updated.status === 'failed') {
              clearPolling();
            }
          } catch { clearPolling(); }
        }, 3000);
      }
    } catch (e) {
      app.innerHTML = `<div class="empty-state"><h3>Simulation not found</h3><p>ID: ${esc(id)}</p><a href="#/" class="btn">Back to Experiments</a></div>`;
    }
  }

  async function renderSimView(sim) {
    const app = document.getElementById('app');
    const typeName = sim.simulation_type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    let stagesHtml = '';
    try {
      const stages = await api('/simulations/' + sim.id + '/stages');
      if (stages.length > 0) {
        stagesHtml = '<div class="pipeline">' + stages.map((stage, i) => {
          const dot = `<div class="pipeline-stage">
            <div class="pipeline-dot ${stage.status}"></div>
            <span class="pipeline-label">${esc(stage.stage_name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()))}</span>
          </div>`;
          if (i < stages.length - 1) {
            const lineStatus = stage.status === 'completed' ? 'completed' : stage.status === 'running' ? 'running' : '';
            return dot + `<div class="pipeline-line ${lineStatus}"></div>`;
          }
          return dot;
        }).join('') + '</div>';
      }
    } catch {}

    let resultHtml = '';
    if (sim.status === 'completed') {
      resultHtml = await renderResults(sim);
    } else if (sim.status === 'failed') {
      resultHtml = `
        <div class="error-panel">
          <h3>Simulation Failed</h3>
          <p>${sim.summary ? esc(sim.summary) : 'An unknown error occurred.'}</p>
        </div>
        <a href="#/" class="btn">Back to Experiments</a>`;
    } else {
      resultHtml = '<div class="loading"><div class="spinner"></div>Simulation in progress...</div>';
    }

    app.innerHTML = `
      <div class="view-header">
        <a href="#/" class="back-link">&larr; Experiments</a>
        <div class="sim-header">
          <h2>${esc(typeName)}</h2>
          ${statusBadge(sim.status)}
        </div>
        <div class="sim-meta">
          <span>Created: ${formatDate(sim.created_at)}</span>
          ${sim.completed_at ? `<span>Duration: ${formatDuration(sim.created_at, sim.completed_at)}</span>` : ''}
        </div>
      </div>
      ${stagesHtml}
      ${resultHtml}`;

    // Re-bind expand/collapse on agent cards
    app.querySelectorAll('.agent-card-header').forEach(header => {
      header.addEventListener('click', () => {
        header.closest('.agent-card').classList.toggle('expanded');
      });
    });
  }

  async function renderResults(sim) {
    let neighborhoodLink = `
      <div style="margin-bottom:20px;">
        <a href="#/neighborhood/${esc(sim.id)}" class="btn btn-primary">View Neighborhood</a>
      </div>`;

    let reportHtml = '';
    if (sim.summary) {
      reportHtml = `
        <div class="section-title">Synthesis Report</div>
        <div class="report-panel">
          <div class="report-content">${simpleMarkdown(sim.summary)}</div>
        </div>`;
    }

    let agentsHtml = '';
    try {
      const agents = await api('/simulations/' + sim.id + '/agents');
      const respondents = agents.filter(a =>
        a.agent_name !== 'distribution_generator' && a.agent_name !== 'synthesizer'
      );

      if (respondents.length > 0) {
        agentsHtml = `
          <div class="section-title">Respondents (${respondents.length})</div>
          <div class="agent-cards">
            ${respondents.map(agent => renderAgentCard(agent)).join('')}
          </div>`;
      }
    } catch {}

    return neighborhoodLink + reportHtml + agentsHtml;
  }

  function renderAgentCard(agent) {
    const persona = agent.persona || {};
    const name = persona.name || agent.agent_name || 'Agent';
    const occupation = persona.occupation || '';
    const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const stance = persona.stance || agent.structured_output?.stance || '';

    const detailFields = ['age', 'gender', 'political_leaning', 'location_type', 'key_concerns'];
    const details = detailFields
      .filter(f => persona[f])
      .map(f => {
        const label = f.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const val = Array.isArray(persona[f]) ? persona[f].join(', ') : persona[f];
        return `<div><div class="persona-detail-label">${esc(label)}</div><div class="persona-detail-value">${esc(String(val))}</div></div>`;
      }).join('');

    const response = agent.output_text || '';

    let stanceBadge = '';
    if (stance) {
      const stanceClass = stance.toLowerCase().includes('support') ? 'success'
        : stance.toLowerCase().includes('oppose') ? 'failed'
        : 'pending';
      stanceBadge = `<span class="badge badge-${stanceClass}">${esc(stance)}</span>`;
    }

    return `
      <div class="agent-card">
        <div class="agent-card-header">
          <div class="agent-persona-summary">
            <div class="agent-avatar">${esc(initials)}</div>
            <div>
              <div class="agent-name">${esc(name)}</div>
              ${occupation ? `<div class="agent-occupation">${esc(occupation)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${stanceBadge}
            <span class="chevron">&#9660;</span>
          </div>
        </div>
        <div class="agent-card-body">
          ${details ? `<div class="persona-details">${details}</div>` : ''}
          ${response ? `<div class="agent-response">${esc(response)}</div>` : ''}
        </div>
      </div>`;
  }

  async function renderHistory() {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading history...</div>';

    try {
      const data = await api('/simulations');
      const sims = data.simulations || [];

      if (sims.length === 0) {
        app.innerHTML = `
          <div class="view-header"><h2>History</h2></div>
          <div class="empty-state">
            <h3>No simulations yet</h3>
            <p>Run your first experiment to see results here.</p>
            <a href="#/" class="btn btn-primary">Browse Experiments</a>
          </div>`;
        return;
      }

      app.innerHTML = `
        <div class="view-header">
          <h2>History</h2>
          <p>${sims.length} simulation${sims.length !== 1 ? 's' : ''}</p>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="history-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>Status</th>
                <th>Created</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody>
              ${sims.map(sim => {
                const typeName = sim.simulation_type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                return `
                  <tr onclick="location.hash='/sim/${esc(sim.id)}'">
                    <td class="type-col">${esc(typeName)}</td>
                    <td>${statusBadge(sim.status)}</td>
                    <td>${formatDate(sim.created_at)}</td>
                    <td>${formatDuration(sim.created_at, sim.completed_at)}</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (e) {
      app.innerHTML = '<div class="empty-state"><h3>Could not load history</h3><p>Check that the API is running.</p></div>';
    }
  }

  async function renderNeighborhood(simId) {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading neighborhood...</div>';

    // Fetch agent data from API
    let agentData = [];
    try {
      const agents = await api('/simulations/' + simId + '/agents');
      agentData = agents.filter(a =>
        a.agent_name !== 'distribution_generator' && a.agent_name !== 'synthesizer'
      ).slice(0, 8);
    } catch (e) {
      app.innerHTML = `
        <div class="view-header">
          <a href="#/sim/${esc(simId)}" class="back-link">&larr; Back to Simulation</a>
          <h2>Neighborhood View</h2>
        </div>
        <div class="empty-state"><h3>Could not load agents</h3><p>Make sure the simulation has completed.</p></div>`;
      return;
    }

    if (agentData.length === 0) {
      app.innerHTML = `
        <div class="view-header">
          <a href="#/sim/${esc(simId)}" class="back-link">&larr; Back to Simulation</a>
          <h2>Neighborhood View</h2>
        </div>
        <div class="empty-state"><h3>No agents found</h3><p>This simulation has no respondent agents.</p></div>`;
      return;
    }

    // Set up container
    app.innerHTML = `
      <div class="view-header" style="margin-bottom:16px;">
        <a href="#/sim/${esc(simId)}" class="back-link">&larr; Back to Simulation</a>
        <h2>Neighborhood View</h2>
        <p>${agentData.length} agents wandering the neighborhood</p>
      </div>
      <div id="p5-container" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);"></div>`;

    // Launch p5 sketch
    const sketch = function(p) {
      let bgImg, spriteSheet;
      let sprites = [];
      let agents = [];
      let canvasW, canvasH;
      const SPRITE_COLS = 4;
      const SPRITE_ROWS = 2;
      const AGENT_DISPLAY_SIZE = 48;
      const HIT_RADIUS = 28;
      const MOVE_SPEED = 0.8;
      const WANDER_RADIUS = 80;

      p.preload = function() {
        bgImg = p.loadImage('/static/WhatsApp%20Image%202026-03-01%20at%201.05.27%20PM.jpeg');
        spriteSheet = p.loadImage('/static/WhatsApp%20Image%202026-03-01%20at%201.13.01%20PM.jpeg');
      };

      p.setup = function() {
        const container = document.getElementById('p5-container');
        canvasW = Math.max(Math.min(container.offsetWidth, 950), 300);
        canvasH = Math.round(canvasW * (bgImg.height / bgImg.width));
        const canvas = p.createCanvas(canvasW, canvasH);
        canvas.parent('p5-container');
        p.imageMode(p.CORNER);
        p.textFont('monospace');
        p.frameRate(30);

        // Slice sprite sheet into individual character sprites
        const sw = spriteSheet.width / SPRITE_COLS;
        const sh = spriteSheet.height / SPRITE_ROWS;
        for (let row = 0; row < SPRITE_ROWS; row++) {
          for (let col = 0; col < SPRITE_COLS; col++) {
            sprites.push(spriteSheet.get(col * sw, row * sh, sw, sh));
          }
        }

        // Load background pixels for grass detection
        bgImg.loadPixels();

        // Initialize agents
        for (let i = 0; i < agentData.length; i++) {
          const ad = agentData[i];
          const sprite = sprites[i % sprites.length];
          let ax, ay;
          let attempts = 0;
          do {
            ax = p.random(AGENT_DISPLAY_SIZE, canvasW - AGENT_DISPLAY_SIZE);
            ay = p.random(AGENT_DISPLAY_SIZE, canvasH - AGENT_DISPLAY_SIZE);
            attempts++;
          } while (!isGrass(ax, ay) && attempts < 500);

          agents.push({
            x: ax,
            y: ay,
            targetX: ax,
            targetY: ay,
            speed: MOVE_SPEED + p.random(-0.2, 0.2),
            sprite: sprite,
            state: 'CHOOSING',
            pauseTimer: 0,
            hovering: false,
            response: ad.output_text || 'No response recorded.',
            name: (ad.persona && ad.persona.name) || ad.agent_name || ('Agent ' + (i + 1)),
          });
        }
      };

      function isGrass(px, py) {
        const imgX = Math.floor((px / canvasW) * bgImg.width);
        const imgY = Math.floor((py / canvasH) * bgImg.height);
        if (imgX < 0 || imgX >= bgImg.width || imgY < 0 || imgY >= bgImg.height) return false;
        const idx = (imgY * bgImg.width + imgX) * 4;
        const r = bgImg.pixels[idx];
        const g = bgImg.pixels[idx + 1];
        const b = bgImg.pixels[idx + 2];
        return g > r && g > b && g > 80;
      }

      function pickWanderTarget(agent) {
        let tx, ty;
        let attempts = 0;
        do {
          const angle = p.random(p.TWO_PI);
          const dist = p.random(40, WANDER_RADIUS);
          tx = agent.x + Math.cos(angle) * dist;
          ty = agent.y + Math.sin(angle) * dist;
          tx = p.constrain(tx, AGENT_DISPLAY_SIZE, canvasW - AGENT_DISPLAY_SIZE);
          ty = p.constrain(ty, AGENT_DISPLAY_SIZE, canvasH - AGENT_DISPLAY_SIZE);
          attempts++;
        } while (!isGrass(tx, ty) && attempts < 100);
        if (!isGrass(tx, ty)) {
          tx = agent.x;
          ty = agent.y;
        }
        return { x: tx, y: ty };
      }

      p.draw = function() {
        p.image(bgImg, 0, 0, canvasW, canvasH);

        for (const agent of agents) {
          if (!agent.hovering) {
            updateAgent(agent);
          }
          drawAgent(agent);
        }

        for (const agent of agents) {
          if (agent.hovering) {
            drawTooltip(agent);
          }
        }
      };

      function updateAgent(agent) {
        switch (agent.state) {
          case 'CHOOSING': {
            const target = pickWanderTarget(agent);
            agent.targetX = target.x;
            agent.targetY = target.y;
            agent.state = 'MOVING';
            break;
          }
          case 'MOVING': {
            const dx = agent.targetX - agent.x;
            const dy = agent.targetY - agent.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 2) {
              agent.x = agent.targetX;
              agent.y = agent.targetY;
              agent.pauseTimer = p.floor(p.random(120, 240));
              agent.state = 'PAUSING';
            } else {
              agent.x += (dx / dist) * agent.speed;
              agent.y += (dy / dist) * agent.speed;
            }
            break;
          }
          case 'PAUSING': {
            agent.pauseTimer--;
            if (agent.pauseTimer <= 0) {
              agent.state = 'CHOOSING';
            }
            break;
          }
        }
      }

      function drawAgent(agent) {
        const d = p.dist(p.mouseX, p.mouseY, agent.x, agent.y);
        const wasHovering = agent.hovering;
        agent.hovering = d < HIT_RADIUS;

        if (wasHovering && !agent.hovering) {
          agent.state = 'CHOOSING';
        }

        const s = AGENT_DISPLAY_SIZE;
        p.push();
        if (agent.hovering) {
          p.tint(255, 255, 200);
        }
        p.image(agent.sprite, agent.x - s / 2, agent.y - s / 2, s, s);
        p.pop();

        p.push();
        p.fill(255);
        p.stroke(0);
        p.strokeWeight(2);
        p.textAlign(p.CENTER, p.TOP);
        p.textSize(10);
        p.text(agent.name.split(' ')[0], agent.x, agent.y + s / 2 + 2);
        p.pop();
      }

      function drawTooltip(agent) {
        const text = agent.response;
        const maxW = 220;
        const padding = 10;
        const lineH = 14;
        const bubbleX = agent.x;
        const s = AGENT_DISPLAY_SIZE;

        p.textSize(11);
        p.textFont('monospace');
        const maxTextW = maxW - padding * 2;
        const words = text.split(' ');
        let lines = [];
        let currentLine = '';
        for (const word of words) {
          // Truncate any single word that exceeds the bubble width
          let w = word;
          if (p.textWidth(w) > maxTextW) {
            while (p.textWidth(w + '...') > maxTextW && w.length > 1) {
              w = w.slice(0, -1);
            }
            w = w + '...';
          }
          const testLine = currentLine ? currentLine + ' ' + w : w;
          if (p.textWidth(testLine) > maxTextW) {
            if (currentLine) lines.push(currentLine);
            currentLine = w;
          } else {
            currentLine = testLine;
          }
          if (lines.length >= 5) {
            lines[lines.length - 1] = lines[lines.length - 1] + '...';
            currentLine = '';
            break;
          }
        }
        if (currentLine) lines.push(currentLine);

        const bubbleW = maxW;
        const bubbleH = lines.length * lineH + padding * 2;
        const bubbleY = agent.y - s / 2 - bubbleH - 12;

        const bx = p.constrain(bubbleX - bubbleW / 2, 4, canvasW - bubbleW - 4);
        const by = Math.max(4, bubbleY);

        p.push();
        p.noStroke();
        p.fill(0, 0, 0, 40);
        p.rect(bx + 3, by + 3, bubbleW, bubbleH, 6);

        p.fill(255, 255, 245);
        p.stroke(60);
        p.strokeWeight(2);
        p.rect(bx, by, bubbleW, bubbleH, 6);

        const tailX = p.constrain(bubbleX, bx + 10, bx + bubbleW - 10);
        p.fill(255, 255, 245);
        p.stroke(60);
        p.strokeWeight(2);
        p.triangle(
          tailX - 6, by + bubbleH,
          tailX + 6, by + bubbleH,
          tailX, by + bubbleH + 8
        );
        p.noStroke();
        p.fill(255, 255, 245);
        p.rect(tailX - 5, by + bubbleH - 2, 10, 3);

        p.fill(30);
        p.noStroke();
        p.textAlign(p.LEFT, p.TOP);
        p.textSize(11);
        for (let i = 0; i < lines.length; i++) {
          p.text(lines[i], bx + padding, by + padding + i * lineH);
        }
        p.pop();
      }
    };

    p5Instance = new p5(sketch, document.getElementById('p5-container'));
  }
</script>
